name: Deploy to IONOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp rsync

      - name: Build clean publish dir
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='scripts' \
            --exclude='assets/img-src' \
            --exclude='deploy' \
            --exclude='_site' \
            --exclude='*.md' \
            ./ _site/
          echo "----- _site Inhalt -----"
          ls -la _site

      - name: Deploy via SFTP (lftp mirror) to IONOS /PantomimeNeu
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          SFTP_PASS: ${{ secrets.IONOS_SFTP_PASS }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" <<'EOF'
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 2
          rm -rf /PantomimeNeu/.git
          rm -rf /PantomimeNeu/.github
          rm -rf /PantomimeNeu/scripts
          rm -rf /PantomimeNeu/deploy
          mirror -R --verbose _site/ /PantomimeNeu/
          bye
          EOF
